<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Lost & Found</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.25rem;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-md);
    }
    .auth-card__logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 600; margin-bottom: 1.5rem;
      text-decoration: none; color: var(--text-primary);
    }
    .auth-card__logo-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: var(--green-400);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-card h2 { margin-bottom: 0.25rem; }
    .auth-card__sub {
      font-size: 0.875rem; color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .auth-card__form { display: flex; flex-direction: column; gap: 1rem; }
    .auth-card__footer {
      text-align: center; margin-top: 1.25rem;
      font-size: 0.85rem; color: var(--text-muted);
    }
    .auth-card__footer a { color: var(--green-600); text-decoration: none; }
    .auth-card__footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <a href="../index.html" class="auth-card__logo">
      <div class="auth-card__logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="7" r="3" stroke="white" stroke-width="1.5"/>
          <path d="M9 11C5.7 11 3.5 12.8 3.5 15h11C14.5 12.8 12.3 11 9 11z" fill="white" opacity=".85"/>
        </svg>
      </div>
      Lost &amp; Found
    </a>

    <h2>Welcome back</h2>
    <p class="auth-card__sub">Sign in to your account to continue.</p>

    <form class="auth-card__form" id="login-form">

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="email" class="form-input" placeholder="abebe@email.com"/>
        <span class="form-error" id="email-error">Please enter your email</span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Your password"/>
        <span class="form-error" id="pass-error">Please enter your password</span>
      </div>

      <button type="submit" class="btn btn--primary btn--full" id="login-btn">
        Sign in
      </button>

      <div class="form-error" id="general-error"></div>

    </form>

    <div class="auth-card__footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>

  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  // Send user to dashboard if already logged in
  redirectIfAuthed();

  const form = document.getElementById('login-form');
  const btn  = document.getElementById('login-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    // Clear previous errors
    document.querySelectorAll('.form-error').forEach(el => el.classList.remove('visible'));

    // Validate
    let valid = true;
    if (!email)    { document.getElementById('email-error').classList.add('visible'); valid = false; }
    if (!password) { document.getElementById('pass-error').classList.add('visible'); valid = false; }
    if (!valid) return;

    // Disable button while loading
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    // Sign in with Supabase
    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      const el = document.getElementById('general-error');
      el.textContent = error.message;
      el.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }

    showToast('Welcome back!', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1000);
  });
</script>

</body>
</html>
