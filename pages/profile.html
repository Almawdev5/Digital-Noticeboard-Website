<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Lost & Found</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .profile-page {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    .profile-header {
      display: flex; align-items: center; gap: 1.25rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .profile-header__avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--green-50);
      color: var(--green-600);
      font-size: 1.5rem; font-weight: 600;
      display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .profile-header__info h2 { margin-bottom: 4px; }
    .profile-header__info p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .profile-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .profile-card h3 {
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .profile-stat {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      text-align: center;
    }
    .profile-stat__n {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--green-400);
    }
    .profile-stat__l {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .my-listings {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .my-listing-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text-primary);
      font-size: 0.875rem;
      transition: background 0.15s;
    }
    .my-listing-item:hover { background: var(--border); }
    .my-listing-item__left {
      display: flex; align-items: center; gap: 8px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar__inner">
    <a href="dashboard.html" class="navbar__logo">
      <div class="navbar__logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="7" r="3" stroke="white" stroke-width="1.5"/>
          <path d="M9 11C5.7 11 3.5 12.8 3.5 15h11C14.5 12.8 12.3 11 9 11z" fill="white" opacity=".85"/>
        </svg>
      </div>
      Lost &amp; Found
    </a>
    <div class="navbar__links">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
      <a href="dashboard.html" class="btn btn--ghost btn--sm">← Back</a>
    </div>
  </div>
</nav>

<div class="profile-page">

  <!-- Profile header -->
  <div class="profile-header">
    <div class="profile-header__avatar" id="profile-avatar">—</div>
    <div class="profile-header__info">
      <h2 id="profile-name">Loading...</h2>
      <p id="profile-email">—</p>
      <span class="badge" id="profile-verified">Community member</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="profile-stats">
    <div class="profile-stat">
      <div class="profile-stat__n" id="stat-total">—</div>
      <div class="profile-stat__l">Total posts</div>
    </div>
    <div class="profile-stat">
      <div class="profile-stat__n" id="stat-lost">—</div>
      <div class="profile-stat__l">Lost items</div>
    </div>
    <div class="profile-stat">
      <div class="profile-stat__n" id="stat-found">—</div>
      <div class="profile-stat__l">Found items</div>
    </div>
  </div>

  <!-- Edit profile -->
  <div class="profile-card">
    <h3>✏️ Edit profile</h3>
    <div class="form-group">
      <label class="form-label">Full name</label>
      <input type="text" id="edit-name" class="form-input" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Phone number</label>
      <input type="tel" id="edit-phone" class="form-input" placeholder="+251 91 234 5678"/>
    </div>
    <button class="btn btn--primary" id="save-btn" onclick="saveProfile()">
      Save changes
    </button>
    <div class="form-error" id="save-error"></div>
  </div>

  <!-- My listings -->
  <div class="profile-card">
    <h3>📋 My listings</h3>
    <div class="my-listings" id="my-listings">
      <div style="color:var(--text-muted);font-size:0.875rem;">Loading...</div>
    </div>
  </div>

  <!-- Danger zone -->
  <div class="profile-card">
    <h3>🚪 Sign out</h3>
    <button class="btn btn--outline btn--full" id="logout-btn">
      Sign out of account
    </button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  redirectIfNotAuthed();
  initTheme();

  let currentUser = null;

  async function loadProfile() {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session.user;

    // Load profile
    const { data: profile } = await sb
      .from('profiles')
      .select('*')
      .eq('id', currentUser.id)
      .single();

    if (profile) {
      document.getElementById('profile-avatar').textContent = initials(profile.full_name || 'U');
      document.getElementById('profile-name').textContent   = profile.full_name || 'Unknown';
      document.getElementById('profile-email').textContent  = currentUser.email;
      document.getElementById('edit-name').value            = profile.full_name || '';
      document.getElementById('edit-phone').value           = profile.phone || '';

      const verifiedEl = document.getElementById('profile-verified');
      if (profile.verified) {
        verifiedEl.textContent  = '✅ Verified member';
        verifiedEl.className    = 'badge badge--verified';
      } else {
        verifiedEl.textContent  = 'Community member';
        verifiedEl.className    = 'badge';
        verifiedEl.style.background = 'var(--bg-tertiary)';
        verifiedEl.style.color      = 'var(--text-muted)';
      }
    }

    // Load my listings
    const { data: listings } = await sb
      .from('listings')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    const myListings = listings || [];

    // Stats
    document.getElementById('stat-total').textContent = myListings.length;
    document.getElementById('stat-lost').textContent  = myListings.filter(l => l.type === 'lost').length;
    document.getElementById('stat-found').textContent = myListings.filter(l => l.type === 'found').length;

    // Listings list
    const listEl = document.getElementById('my-listings');
    if (myListings.length === 0) {
      listEl.innerHTML = `
        <div class="empty">
          <div class="empty__icon">📋</div>
          <p>You haven't posted anything yet.</p>
        </div>`;
      return;
    }

    listEl.innerHTML = myListings.map(item => `
      <a class="my-listing-item" href="item-detail.html?id=${item.id}">
        <div class="my-listing-item__left">
          <span class="badge badge--${item.type}">${item.type}</span>
          ${item.title}
        </div>
        <span style="font-size:0.75rem;color:var(--text-muted);">${timeAgo(item.created_at)}</span>
      </a>
    `).join('');
  }

  // ── Save profile ──
  async function saveProfile() {
    const name  = document.getElementById('edit-name').value.trim();
    const phone = document.getElementById('edit-phone').value.trim();
    const btn   = document.getElementById('save-btn');

    if (!name) {
      showToast('Please enter your name', 'error');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Saving...';

    const { error } = await sb
      .from('profiles')
      .update({ full_name: name, phone })
      .eq('id', currentUser.id);

    if (error) {
      showToast('Failed to save', 'error');
      btn.disabled    = false;
      btn.textContent = 'Save changes';
      return;
    }

    showToast('Profile updated! ✅', 'success');
    btn.disabled    = false;
    btn.textContent = 'Save changes';

    document.getElementById('profile-name').textContent   = name;
    document.getElementById('profile-avatar').textContent = initials(name);
  }

  // ── Logout ──
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '../index.html';
  });

  loadProfile();
</script>

</body>
</html>
