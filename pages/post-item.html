<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post Item — Lost & Found</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .post-page {
      max-width: 620px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    .post-page h2 { margin-bottom: 0.25rem; }
    .post-page__sub {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .post-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .type-btn {
      padding: 12px;
      border: 2px solid var(--border-md);
      border-radius: var(--radius-md);
      background: #fff;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.15s;
      text-align: center;
    }
    .type-btn.active.lost {
      border-color: var(--coral-400);
      background: var(--coral-50);
      color: var(--coral-600);
    }
    .type-btn.active.found {
      border-color: var(--green-400);
      background: var(--green-50);
      color: var(--green-600);
    }
    .photo-upload {
      border: 2px dashed var(--border-md);
      border-radius: var(--radius-md);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }
    .photo-upload:hover { border-color: var(--green-400); }
    .photo-upload input {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%;
    }
    .photo-upload__icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .photo-upload__text { font-size: 0.85rem; color: var(--text-muted); }
    .photo-preview {
      width: 100%; height: 200px;
      object-fit: cover;
      border-radius: var(--radius-md);
      display: none;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar__inner">
    <a href="dashboard.html" class="navbar__logo">
      <div class="navbar__logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="7" r="3" stroke="white" stroke-width="1.5"/>
          <path d="M9 11C5.7 11 3.5 12.8 3.5 15h11C14.5 12.8 12.3 11 9 11z" fill="white" opacity=".85"/>
        </svg>
      </div>
      Lost &amp; Found
    </a>
    <div class="navbar__links">
      <a href="dashboard.html" class="btn btn--ghost btn--sm">← Back</a>
    </div>
  </div>
</nav>

<div class="post-page">
  <h2>Post an item</h2>
  <p class="post-page__sub">Fill in the details to help the community find or return this item.</p>

  <div class="post-card">

    <!-- Type toggle -->
    <div class="form-group">
      <label class="form-label">What are you posting?</label>
      <div class="type-toggle">
        <button class="type-btn active lost" data-type="lost" id="btn-lost">
          😟 I lost something
        </button>
        <button class="type-btn found" data-type="found" id="btn-found">
          🎉 I found something
        </button>
      </div>
    </div>

    <!-- Title -->
    <div class="form-group">
      <label class="form-label">Item name</label>
      <input type="text" id="title" class="form-input" placeholder="e.g. Black Samsung Phone"/>
      <span class="form-error" id="title-error">Please enter the item name</span>
    </div>

    <!-- Category -->
    <div class="form-group">
      <label class="form-label">Category</label>
      <select id="category" class="form-select">
        <option value="">Select a category</option>
        <option>ID / Documents</option>
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Accessories</option>
        <option>Keys</option>
        <option>Pet</option>
        <option>Other</option>
      </select>
      <span class="form-error" id="category-error">Please select a category</span>
    </div>

    <!-- Location -->
    <div class="form-group">
      <label class="form-label">Last seen location</label>
      <input type="text" id="location" class="form-input" placeholder="e.g. Bole, near Atlas Hotel"/>
      <span class="form-error" id="location-error">Please enter a location</span>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="description" class="form-textarea"
        placeholder="Describe the item — color, size, any identifying features..."></textarea>
    </div>

    <!-- Photo upload -->
    <div class="form-group">
      <label class="form-label">Photo <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
      <img id="photo-preview" class="photo-preview" alt="Preview"/>
      <div class="photo-upload" id="upload-box">
        <input type="file" id="photo-input" accept="image/*"/>
        <div class="photo-upload__icon">📷</div>
        <div class="photo-upload__text">Click to upload a photo</div>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn btn--primary btn--full" id="submit-btn">
      Post listing
    </button>
    <div class="form-error" id="general-error"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  redirectIfNotAuthed();

  let selectedType = 'lost';
  let photoFile    = null;

  // ── Type toggle ──
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.type-btn').forEach(b => {
        b.classList.remove('active', 'lost', 'found');
      });
      btn.classList.add('active', btn.dataset.type);
      selectedType = btn.dataset.type;
    });
  });

  // ── Photo preview ──
  document.getElementById('photo-input').addEventListener('change', (e) => {
    photoFile = e.target.files[0];
    if (!photoFile) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const preview = document.getElementById('photo-preview');
      preview.src = ev.target.result;
      preview.style.display = 'block';
      document.getElementById('upload-box').style.display = 'none';
    };
    reader.readAsDataURL(photoFile);
  });

  // ── Submit ──
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const title       = document.getElementById('title').value.trim();
    const category    = document.getElementById('category').value;
    const location    = document.getElementById('location').value.trim();
    const description = document.getElementById('description').value.trim();

    // Clear errors
    document.querySelectorAll('.form-error').forEach(el => el.classList.remove('visible'));

    // Validate
    let valid = true;
    if (!title)    { document.getElementById('title-error').classList.add('visible');    valid = false; }
    if (!category) { document.getElementById('category-error').classList.add('visible'); valid = false; }
    if (!location) { document.getElementById('location-error').classList.add('visible'); valid = false; }
    if (!valid) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Posting...';

    // Get current user
    const { data: { session } } = await sb.auth.getSession();
    const userId = session.user.id;

    // Upload photo if selected
    let photoUrl = null;
    if (photoFile) {
      const fileName = `${userId}/${Date.now()}-${photoFile.name}`;
      const { error: uploadError } = await sb.storage
        .from('listings-photos')
        .upload(fileName, photoFile);

      if (!uploadError) {
        const { data: urlData } = sb.storage
          .from('listings-photos')
          .getPublicUrl(fileName);
        photoUrl = urlData.publicUrl;
      }
    }

    // Insert listing
    const { error } = await sb.from('listings').insert({
      type: selectedType,
      title,
      category,
      location,
      description,
      photo_url: photoUrl,
      user_id: userId,
      status: 'active'
    });

    if (error) {
      const el = document.getElementById('general-error');
      el.textContent = error.message;
      el.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Post listing';
      return;
    }

    showToast('Listing posted successfully!', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
  });
</script>

</body>
</html>
