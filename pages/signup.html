<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ReFind Digital Noticeboard</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.25rem;
      background: var(--bg-primary);
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-md);
    }
    .auth-card__logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; margin-bottom: 1.5rem;
      text-decoration: none; color: var(--text-primary);
    }
    .auth-card h2 { margin-bottom: 0.25rem; }
    .auth-card__sub {
      font-size: 0.875rem; color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .auth-card__form { display: flex; flex-direction: column; gap: 1rem; }
    .auth-card__footer {
      text-align: center; margin-top: 1.25rem;
      font-size: 0.85rem; color: var(--text-muted);
    }
    .auth-card__footer a { color: var(--brand-400); text-decoration: none; }
    .auth-card__footer a:hover { text-decoration: underline; }
    .auth-hero-bg {
      position: fixed; top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 350px;
      background: radial-gradient(ellipse, rgba(75,0,130,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
  </style>
</head>
<body>

<div class="auth-hero-bg"></div>

<div class="auth-page" style="position:relative;z-index:1;">
  <div class="auth-card">

    <!-- Logo -->
    <a href="../index.html" class="auth-card__logo">
      <div class="navbar__logo-pill">
        <div class="navbar__logo-icon">
          <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
            <circle cx="8" cy="7" r="4" fill="none" stroke="#4B0082" stroke-width="2"/>
            <line x1="11.5" y1="11" x2="15" y2="15" stroke="#4B0082" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 5 Q8 3 10 5" fill="none" stroke="#4B0082" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9.5 4 L11 5.5 L9 6.5" fill="none" stroke="#4B0082" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="navbar__logo-text"><span>Re</span>Find</span>
      </div>
      <span style="font-size:0.78rem;color:var(--text-muted);margin-left:4px;">Digital Noticeboard</span>
    </a>

    <h2>Create your account</h2>
    <p class="auth-card__sub">Join the community and help reunite lost items.</p>

    <form class="auth-card__form" id="signup-form">

      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" id="full-name" class="form-input" placeholder="Abebe Kebede"/>
        <span class="form-error" id="name-error">Please enter your full name</span>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="email" class="form-input" placeholder="abebe@email.com"/>
        <span class="form-error" id="email-error">Please enter a valid email</span>
      </div>

      <div class="form-group">
        <label class="form-label">Phone number</label>
        <input type="tel" id="phone" class="form-input" placeholder="+251 91 234 5678"/>
        <span class="form-hint">Used to help verify your identity</span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 6 characters"/>
        <span class="form-error" id="pass-error">Password must be at least 6 characters</span>
      </div>

      <button type="submit" class="btn btn--primary btn--full" id="signup-btn">
        Create account
      </button>

      <div class="form-error" id="general-error"></div>

    </form>

    <div class="auth-card__footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  redirectIfAuthed();
  initTheme();

  const form = document.getElementById('signup-form');
  const btn  = document.getElementById('signup-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullName = document.getElementById('full-name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;

    document.querySelectorAll('.form-error').forEach(el => el.classList.remove('visible'));

    let valid = true;
    if (!fullName) { document.getElementById('name-error').classList.add('visible');  valid = false; }
    if (!email)    { document.getElementById('email-error').classList.add('visible'); valid = false; }
    if (password.length < 6) { document.getElementById('pass-error').classList.add('visible'); valid = false; }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    const { error } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: fullName, phone }
      }
    });

    if (error) {
      const el = document.getElementById('general-error');
      el.textContent = error.message;
      el.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Create account';
      return;
    }
showToast('Account created successfully! Welcome to ReFind!');
    setTimeout(() => window.location.href = 'login.html', 2000);
  });
</script>

</body>
</html>
