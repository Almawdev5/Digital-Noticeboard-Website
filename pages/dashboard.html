<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — ReFind Digital Noticeboard</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .dashboard-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 0;
      margin-bottom: 1.5rem;
    }
    .dashboard-header__inner {
      max-width: 1080px; margin: 0 auto; padding: 0 1.25rem;
      display: flex; align-items: center;
      justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .dashboard-header h1 { font-size: 1.3rem; }
    .dashboard-header p  { font-size: 0.82rem; color: var(--text-muted); }

    .filters {
      display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .search-input {
      flex: 1; min-width: 0;
      padding: 8px 14px;
      border: 1px solid var(--border-md);
      border-radius: 20px; font-size: 0.85rem;
      font-family: var(--font); outline: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
      width: 100%;
    }
    .search-input:focus { border-color: var(--brand-400); }

    .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      border: 1px solid var(--border-md);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border-radius: 20px; padding: 6px 14px;
      font-size: 0.8rem; cursor: pointer;
      font-family: var(--font); transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: var(--brand-400);
      border-color: var(--brand-400);
      color: #fff;
    }
    .filter-btn.active.lost {
      background: var(--coral-400);
      border-color: var(--coral-400);
    }

    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .listing-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden; cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      text-decoration: none; color: inherit;
      display: block;
    }
    .listing-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .listing-card__img {
      width: 100%; height: 160px;
      object-fit: cover;
      display: flex; align-items: center;
      justify-content: center; font-size: 3rem;
    }
    .listing-card__img.lost-bg  { background: var(--coral-50); }
    .listing-card__img.found-bg { background: var(--brand-50); }
    .listing-card__body { padding: 12px 14px; }
    .listing-card__top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 6px;
    }
    .listing-card__title {
      font-size: 0.95rem; font-weight: 500;
      margin-bottom: 4px; color: var(--text-primary);
    }
    .listing-card__loc {
      font-size: 0.78rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 8px;
    }
    .listing-card__footer {
      display: flex; align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .listing-card__user {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--text-secondary);
    }
    .skeleton {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    .skeleton-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .skeleton-img  { height: 160px; }
    .skeleton-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-line { height: 14px; border-radius: 4px; }
    .skeleton-line.short { width: 60%; }

    .nav-avatar {
      width: 30px; height: 30px;
      border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: var(--brand-50); color: var(--brand-400);
      font-size: 0.72rem; font-weight: 600;
      border: 1.5px solid var(--border-md);
      text-decoration: none; flex-shrink: 0;
    }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Footer ── */
    .dash-footer {
      background: #0d0014;
      color: rgba(255,255,255,0.5);
      margin-top: 3rem;
      padding: 1.5rem 1.25rem;
      text-align: center;
    }
    .dash-footer__inner {
      max-width: 1080px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .dash-footer__logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }
    .dash-footer__logo-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--brand-400);
      border-radius: 20px; padding: 4px 12px 4px 6px;
    }
    .dash-footer__logo-icon {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--gold-400);
      display: flex; align-items: center; justify-content: center;
    }
    .dash-footer__logo-text {
      font-size: 0.8rem; font-weight: 700; color: white;
    }
    .dash-footer__logo-text span { color: var(--gold-400); }
    .dash-footer__links {
      display: flex; gap: 1.25rem; flex-wrap: wrap;
      justify-content: center;
    }
    .dash-footer__links a {
      font-size: 0.78rem; color: rgba(255,255,255,0.4);
      text-decoration: none; transition: color 0.15s;
    }
    .dash-footer__links a:hover { color: var(--gold-400); }
    .dash-footer__copy {
      font-size: 0.75rem; color: rgba(255,255,255,0.25);
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .navbar__inner { padding: 0 1rem; }
      .navbar__logo-sub { display: none; }
      #logout-btn { font-size: 0; width: 36px; height: 36px; padding: 0; border-radius: 50%; }
      #logout-btn::before { content: '👋'; font-size: 1rem; }
      #admin-link { font-size: 0; width: 36px; height: 36px; padding: 0; border-radius: 50%; }
      #admin-link::before { content: '🛡️'; font-size: 1rem; }
      .dash-footer__inner { flex-direction: column; align-items: center; text-align: center; }
    }
    @media (max-width: 480px) {
      .listings-grid { grid-template-columns: 1fr; }
      .listing-card__img { height: 200px; }
      .dashboard-header h1 { font-size: 1.1rem; }
    }
    @media (min-width: 481px) and (max-width: 768px) {
      .listings-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .filters { flex-direction: column; align-items: stretch; }
      .search-input { width: 100%; }
      .filter-btns { justify-content: center; }
    }

    .fab {
      display: none;
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--brand-400);
      color: #fff; font-size: 1.5rem;
      border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(75,0,130,0.4);
      align-items: center; justify-content: center;
      text-decoration: none; z-index: 40;
      transition: background 0.15s, transform 0.15s;
    }
    .fab:hover { background: var(--brand-600); transform: scale(1.05); }
    @media (max-width: 600px) {
      .fab { display: flex; }
      .btn--post-mobile { display: none; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar__inner">
    <a href="../index.html" class="navbar__logo">
      <div class="navbar__logo-pill">
        <div class="navbar__logo-icon">
          <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
            <circle cx="8" cy="7" r="4" fill="none" stroke="#4B0082" stroke-width="2"/>
            <line x1="11.5" y1="11" x2="15" y2="15" stroke="#4B0082" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 5 Q8 3 10 5" fill="none" stroke="#4B0082" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9.5 4 L11 5.5 L9 6.5" fill="none" stroke="#4B0082" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="navbar__logo-text"><span>Re</span>Find</span>
      </div>
      <span class="navbar__logo-sub hide-mobile">Digital Noticeboard</span>
    </a>
    <div class="navbar__links">
      <a href="post-item.html" class="btn btn--primary btn--sm btn--post-mobile">+ Post item</a>
      <a href="inbox.html" class="notif-btn" id="inbox-btn" title="Messages">
        💬
        <span class="notif-badge" id="notif-badge"></span>
      </a>
      <a href="profile.html" class="nav-avatar" id="nav-avatar" title="Profile">👤</a>
      <a href="admin.html" class="btn btn--ghost btn--sm" id="admin-link" style="display:none;">🛡️ Admin</a>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign out</button>
    </div>
  </div>
</nav>

<!-- Dashboard Header -->
<div class="dashboard-header">
  <div class="dashboard-header__inner">
    <div>
      <h1>Community listings</h1>
      <p>Browse lost and found items in your area</p>
    </div>
    <div style="display:flex; gap:16px;">
      <div style="text-align:center;">
        <div style="font-size:1.3rem;font-weight:600;color:var(--coral-400);" id="count-lost">—</div>
        <div style="font-size:0.72rem;color:var(--text-muted);">Lost</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:1.3rem;font-weight:600;color:var(--brand-400);" id="count-found">—</div>
        <div style="font-size:0.72rem;color:var(--text-muted);">Found</div>
      </div>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="container page">

  <!-- Filters -->
  <div class="filters">
    <input class="search-input" type="text" placeholder="🔍  Search items or location..." id="search"/>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn lost"   data-filter="lost">Lost</button>
      <button class="filter-btn"        data-filter="found">Found</button>
    </div>
  </div>

  <!-- Grid -->
  <div class="listings-grid" id="listings-grid"></div>

</div>

<!-- Footer -->
<footer class="dash-footer">
  <div class="dash-footer__inner">

    <a href="../index.html" class="dash-footer__logo">
      <div class="dash-footer__logo-pill">
        <div class="dash-footer__logo-icon">
          <svg width="10" height="10" viewBox="0 0 18 18" fill="none">
            <circle cx="8" cy="7" r="4" fill="none" stroke="#4B0082" stroke-width="2.5"/>
            <line x1="11.5" y1="11" x2="15" y2="15" stroke="#4B0082" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="dash-footer__logo-text"><span>Re</span>Find</span>
      </div>
    </a>

    <div class="dash-footer__links">
      <a href="post-item.html">Post an item</a>
      <a href="inbox.html">Inbox</a>
      <a href="profile.html">Profile</a>
      <a href="../index.html">About</a>
    </div>

    <p class="dash-footer__copy">© 2026 ReFind · By Alexis for the community </p>

  </div>
</footer>

<!-- Mobile FAB -->
<a href="post-item.html" class="fab" title="Post item">+</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  redirectIfNotAuthed();
  initTheme();

  const grid    = document.getElementById('listings-grid');
  const search  = document.getElementById('search');
  let allItems  = [];
  let curFilter = 'all';

  async function loadNavAvatar() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    const { data } = await sb
      .from('profiles')
      .select('avatar_url, full_name')
      .eq('id', session.user.id)
      .single();
    const el = document.getElementById('nav-avatar');
    if (data?.avatar_url) {
      el.innerHTML = `<img src="${data.avatar_url}" alt="avatar"/>`;
    } else {
      el.textContent = initials(data?.full_name || '?');
    }
  }

  async function checkUnread() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    const { count } = await sb
      .from('messages')
      .select('id', { count: 'exact' })
      .eq('receiver_id', session.user.id)
      .eq('read', false);
    if (count > 0) {
      const badge = document.getElementById('notif-badge');
      badge.textContent = count;
      badge.style.display = 'flex';
    }
  }

  async function checkAdminLink() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    const { data } = await sb
      .from('profiles')
      .select('is_admin')
      .eq('id', session.user.id)
      .single();
    if (data?.is_admin) {
      document.getElementById('admin-link').style.display = 'inline-flex';
    }
  }

  function showSkeletons() {
    grid.innerHTML = Array(6).fill(`
      <div class="skeleton-card">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
          <div class="skeleton skeleton-line short"></div>
        </div>
      </div>`).join('');
  }

  async function loadListings() {
    showSkeletons();
    const { data, error } = await sb
      .from('listings')
      .select('*, profiles(full_name, verified)')
      .eq('status', 'active')
      .order('created_at', { ascending: false });

    if (error) { showToast('Failed to load listings', 'error'); return; }

    allItems = data || [];
    updateCounts();
    renderListings();
  }

  function updateCounts() {
    document.getElementById('count-lost').textContent  = allItems.filter(i => i.type === 'lost').length;
    document.getElementById('count-found').textContent = allItems.filter(i => i.type === 'found').length;
  }

  function renderListings() {
    const q = search.value.toLowerCase();
    const filtered = allItems.filter(item => {
      if (curFilter !== 'all' && item.type !== curFilter) return false;
      if (q && !item.title.toLowerCase().includes(q) && !item.location.toLowerCase().includes(q)) return false;
      return true;
    });

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty__icon">🔍</div>
          <p>No listings found. Try a different search.</p>
        </div>`;
      return;
    }

    const emojis = {
      'ID / Documents': '🪪', 'Electronics': '📱',
      'Clothing': '👕', 'Accessories': '👜',
      'Keys': '🔑', 'Pet': '🐕', 'Other': '📦'
    };

    grid.innerHTML = filtered.map(item => `
      <a class="listing-card" href="item-detail.html?id=${item.id}">
        <div class="listing-card__img ${item.type}-bg">
          ${item.photo_url
            ? `<img src="${item.photo_url}" style="width:100%;height:100%;object-fit:cover;"/>`
            : emojis[item.category] || '📦'}
        </div>
        <div class="listing-card__body">
          <div class="listing-card__top">
            <span class="badge badge--${item.type}">${item.type === 'lost' ? 'Lost' : 'Found'}</span>
            <span style="font-size:0.72rem;color:var(--text-muted);">${timeAgo(item.created_at)}</span>
          </div>
          <div class="listing-card__title">${item.title}</div>
          <div class="listing-card__loc">📍 ${item.location}</div>
          <div class="listing-card__footer">
            <div class="listing-card__user">
              <div class="avatar avatar--sm">${initials(item.profiles?.full_name || 'U')}</div>
              ${item.profiles?.full_name || 'Unknown'}
            </div>
            ${item.profiles?.verified
              ? '<span class="badge badge--verified">✓ Verified</span>'
              : ''}
          </div>
        </div>
      </a>
    `).join('');
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curFilter = btn.dataset.filter;
      renderListings();
    });
  });

  search.addEventListener('input', renderListings);

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '../index.html';
  });

  checkAdminLink();
  checkUnread();
  loadNavAvatar();
  loadListings();
</script>

</body>
</html>
