<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inbox — Lost & Found</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .inbox-page {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    .inbox-page h2 { margin-bottom: 0.25rem; }
    .inbox-page__sub {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .convo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .convo-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
      cursor: pointer;
    }
    .convo-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .convo-card.unread {
      border-color: var(--green-400);
      background: var(--green-50);
    }
    .convo-card__avatar { flex-shrink: 0; }
    .convo-card__body { flex: 1; min-width: 0; }
    .convo-card__top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 2px;
    }
    .convo-card__name {
      font-weight: 500; font-size: 0.9rem;
      color: var(--text-primary);
    }
    .convo-card__time {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .convo-card__listing {
      font-size: 0.75rem;
      color: var(--green-600);
      margin-bottom: 2px;
    }
    .convo-card__preview {
      font-size: 0.82rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .convo-card__unread-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green-400);
      flex-shrink: 0;
      display: none;
    }
    .convo-card.unread .convo-card__unread-dot {
      display: block;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar__inner">
    <a href="dashboard.html" class="navbar__logo">
      <div class="navbar__logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="7" r="3" stroke="white" stroke-width="1.5"/>
          <path d="M9 11C5.7 11 3.5 12.8 3.5 15h11C14.5 12.8 12.3 11 9 11z" fill="white" opacity=".85"/>
        </svg>
      </div>
      Lost &amp; Found
    </a>
    <div class="navbar__links">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
      <a href="dashboard.html" class="btn btn--ghost btn--sm">← Back</a>
    </div>
  </div>
</nav>

<div class="inbox-page">
  <h2>💬 Inbox</h2>
  <p class="inbox-page__sub">Your conversations about lost and found items.</p>

  <div class="convo-list" id="convo-list">
    <!-- Loading skeleton -->
    <div style="text-align:center;padding:2rem;color:var(--text-muted);">
      Loading conversations...
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  redirectIfNotAuthed();
  initTheme();

  async function loadInbox() {
    const { data: { session } } = await sb.auth.getSession();
    const userId = session.user.id;

    // Get all messages involving this user
    const { data, error } = await sb
      .from('messages')
      .select(`
        *,
        listings(id, title, type),
        sender:profiles!messages_sender_id_fkey(id, full_name),
        receiver:profiles!messages_receiver_id_fkey(id, full_name)
      `)
      .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`)
      .order('created_at', { ascending: false });

    if (error) {
      showToast('Failed to load inbox', 'error');
      return;
    }

    if (!data || data.length === 0) {
      document.getElementById('convo-list').innerHTML = `
        <div class="empty">
          <div class="empty__icon">💬</div>
          <p>No messages yet. Start a conversation by messaging a listing owner!</p>
        </div>`;
      return;
    }

    // Group messages by listing + other user
    const convos = {};
    data.forEach(msg => {
      const otherId   = msg.sender_id === userId ? msg.receiver_id : msg.sender_id;
      const otherUser = msg.sender_id === userId ? msg.receiver : msg.sender;
      const key       = `${msg.listing_id}_${otherId}`;

      if (!convos[key]) {
        convos[key] = {
          listingId:   msg.listing_id,
          listing:     msg.listings,
          otherId,
          otherUser,
          lastMsg:     msg.body,
          lastTime:    msg.created_at,
          unread:      msg.receiver_id === userId && !msg.read
        };
      }
    });

    const list = document.getElementById('convo-list');
    list.innerHTML = Object.values(convos).map(c => `
      <a class="convo-card ${c.unread ? 'unread' : ''}"
        href="chat.html?listing=${c.listingId}&user=${c.otherId}">
        <div class="convo-card__avatar">
          <div class="avatar avatar--md">
            ${initials(c.otherUser?.full_name || 'U')}
          </div>
        </div>
        <div class="convo-card__body">
          <div class="convo-card__top">
            <span class="convo-card__name">${c.otherUser?.full_name || 'Unknown'}</span>
            <span class="convo-card__time">${timeAgo(c.lastTime)}</span>
          </div>
          <div class="convo-card__listing">
            📋 ${c.listing?.title || 'Unknown listing'}
          </div>
          <div class="convo-card__preview">${c.lastMsg}</div>
        </div>
        <div class="convo-card__unread-dot"></div>
      </a>
    `).join('');
  }

  loadInbox();
</script>

</body>
</html>
