<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — Lost & Found</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .admin-page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    .admin-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .admin-header h1 { font-size: 1.4rem; }
    .admin-header p  { font-size: 0.85rem; color: var(--text-muted); }

    .admin-tabs {
      display: flex; gap: 4px;
      margin-bottom: 1.5rem;
      background: var(--gray-100);
      padding: 4px; border-radius: var(--radius-md);
      width: fit-content;
    }
    .admin-tab {
      padding: 7px 18px; border-radius: 8px;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border: none;
      background: transparent; color: var(--text-secondary);
      font-family: var(--font); transition: all 0.15s;
    }
    .admin-tab.active {
      background: #fff; color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .admin-table {
      width: 100%; border-collapse: collapse;
      background: #fff; border-radius: var(--radius-lg);
      overflow: hidden; border: 1px solid var(--border);
    }
    .admin-table th {
      text-align: left; padding: 10px 14px;
      font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted);
      background: var(--gray-50);
      border-bottom: 1px solid var(--border);
    }
    .admin-table td {
      padding: 12px 14px; font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--gray-50); }

    .admin-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem;
    }
    .stat-card__n {
      font-size: 1.75rem; font-weight: 600;
      color: var(--text-primary);
    }
    .stat-card__l {
      font-size: 0.78rem; color: var(--text-muted);
      margin-top: 2px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar__inner">
    <a href="dashboard.html" class="navbar__logo">
      <div class="navbar__logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="7" r="3" stroke="white" stroke-width="1.5"/>
          <path d="M9 11C5.7 11 3.5 12.8 3.5 15h11C14.5 12.8 12.3 11 9 11z" fill="white" opacity=".85"/>
        </svg>
      </div>
      Lost &amp; Found
    </a>
    <div class="navbar__links">
      <a href="dashboard.html" class="btn btn--ghost btn--sm">← Back</a>
    </div>
  </div>
</nav>

<div class="admin-page">

  <!-- Header -->
  <div class="admin-header">
    <div>
      <h1>🛡️ Admin Panel</h1>
      <p>Manage listings, users and reports</p>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-card__n" id="stat-listings">—</div>
      <div class="stat-card__l">Total listings</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__n" id="stat-users">—</div>
      <div class="stat-card__l">Total users</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__n" id="stat-reports">—</div>
      <div class="stat-card__l">Reports</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__n" id="stat-verified">—</div>
      <div class="stat-card__l">Verified users</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="listings">Listings</button>
    <button class="admin-tab" data-tab="users">Users</button>
    <button class="admin-tab" data-tab="reports">Reports</button>
  </div>

  <!-- Listings tab -->
  <div class="tab-panel active" id="tab-listings">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Type</th>
          <th>Category</th>
          <th>Location</th>
          <th>Status</th>
          <th>Posted</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="listings-tbody">
        <tr><td colspan="7" style="text-align:center;color:var(--text-muted);">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Users tab -->
  <div class="tab-panel" id="tab-users">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Verified</th>
          <th>Joined</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr><td colspan="5" style="text-align:center;color:var(--text-muted);">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Reports tab -->
  <div class="tab-panel" id="tab-reports">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Listing</th>
          <th>Reason</th>
          <th>Reported</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="reports-tbody">
        <tr><td colspan="4" style="text-align:center;color:var(--text-muted);">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  redirectIfNotAuthed();

  // ── Tabs ──
  document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // ── Load stats ──
  async function loadStats() {
    const [listings, users, reports, verified] = await Promise.all([
      sb.from('listings').select('id', { count: 'exact' }),
      sb.from('profiles').select('id', { count: 'exact' }),
      sb.from('reports').select('id',  { count: 'exact' }),
      sb.from('profiles').select('id', { count: 'exact' }).eq('verified', true)
    ]);
    document.getElementById('stat-listings').textContent = listings.count || 0;
    document.getElementById('stat-users').textContent    = users.count    || 0;
    document.getElementById('stat-reports').textContent  = reports.count  || 0;
    document.getElementById('stat-verified').textContent = verified.count || 0;
  }

  // ── Load listings ──
  async function loadListings() {
    const { data } = await sb
      .from('listings')
      .select('*, profiles(full_name)')
      .order('created_at', { ascending: false });

    const tbody = document.getElementById('listings-tbody');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);">No listings found</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(item => `
      <tr>
        <td><strong>${item.title}</strong></td>
        <td><span class="badge badge--${item.type}">${item.type}</span></td>
        <td>${item.category}</td>
        <td>${item.location}</td>
        <td>
          <span style="
            font-size:0.75rem; padding:2px 8px; border-radius:10px;
            background:${item.status === 'active' ? 'var(--green-50)' : 'var(--coral-50)'};
            color:${item.status === 'active' ? 'var(--green-600)' : 'var(--coral-600)'};
          ">${item.status}</span>
        </td>
        <td>${timeAgo(item.created_at)}</td>
        <td>
          <div class="admin-actions">
            <button class="btn btn--sm btn--outline"
              onclick="window.open('item-detail.html?id=${item.id}')">
              View
            </button>
            <button class="btn btn--sm btn--danger"
              onclick="removeListing('${item.id}', this)">
              Remove
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Load users ──
  async function loadUsers() {
    const { data } = await sb
      .from('profiles')
      .select('*')
      .order('created_at', { ascending: false });

    const tbody = document.getElementById('users-tbody');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">No users found</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(user => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="avatar avatar--sm">${initials(user.full_name || 'U')}</div>
            ${user.full_name || 'Unknown'}
          </div>
        </td>
        <td>${user.phone || '—'}</td>
        <td>
          <span style="
            font-size:0.75rem; padding:2px 8px; border-radius:10px;
            background:${user.verified ? 'var(--green-50)' : 'var(--gray-100)'};
            color:${user.verified ? 'var(--green-600)' : 'var(--text-muted)'};
          ">${user.verified ? '✅ Verified' : 'Unverified'}</span>
        </td>
        <td>${timeAgo(user.created_at)}</td>
        <td>
          <div class="admin-actions">
            <button class="btn btn--sm btn--${user.verified ? 'outline' : 'primary'}"
              onclick="toggleVerify('${user.id}', ${user.verified}, this)">
              ${user.verified ? 'Unverify' : 'Verify'}
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Load reports ──
  async function loadReports() {
    const { data } = await sb
      .from('reports')
      .select('*, listings(title), profiles(full_name)')
      .order('created_at', { ascending: false });

    const tbody = document.getElementById('reports-tbody');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">No reports yet</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(report => `
      <tr>
        <td><strong>${report.listings?.title || 'Deleted listing'}</strong></td>
        <td>${report.reason || '—'}</td>
        <td>${timeAgo(report.created_at)}</td>
        <td>
          <div class="admin-actions">
            <button class="btn btn--sm btn--danger"
              onclick="removeListing('${report.listing_id}', this)">
              Remove listing
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Remove listing ──
  async function removeListing(id, btn) {
    btn.disabled = true;
    btn.textContent = 'Removing...';
    const { error } = await sb
      .from('listings')
      .update({ status: 'removed' })
      .eq('id', id);
    if (error) {
      showToast('Failed to remove listing', 'error');
      btn.disabled = false;
      btn.textContent = 'Remove';
      return;
    }
    showToast('Listing removed', 'success');
    loadListings();
    loadStats();
  }

  // ── Toggle verify user ──
  async function toggleVerify(id, currentStatus, btn) {
    btn.disabled = true;
    const newStatus = !currentStatus;
    const { error } = await sb
      .from('profiles')
      .update({ verified: newStatus })
      .eq('id', id);
    if (error) {
      showToast('Failed to update user', 'error');
      btn.disabled = false;
      return;
    }
    showToast(newStatus ? 'User verified ✅' : 'User unverified', 'success');
    loadUsers();
    loadStats();
  }

  // ── Init ──
  loadStats();
  loadListings();
  loadUsers();
  loadReports();
</script>

</body>
</html>
