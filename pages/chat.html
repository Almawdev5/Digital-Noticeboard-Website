<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — Lost & Found</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .chat-layout {
      display: flex; flex: 1; overflow: hidden;
      max-width: 1080px; margin: 0 auto;
      width: 100%; padding: 1rem;
      gap: 1rem;
    }

    /* ── Chat window ── */
    .chat-window {
      flex: 1; display: flex; flex-direction: column;
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .chat-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .chat-header__info { flex: 1; }
    .chat-header__name { font-weight: 500; font-size: 0.95rem; }
    .chat-header__sub  { font-size: 0.75rem; color: var(--text-muted); }
    .chat-header__lock {
      font-size: 0.72rem; color: var(--green-600);
      background: var(--green-50);
      padding: 3px 8px; border-radius: 10px;
    }

    .chat-listing {
      padding: 0.75rem 1.25rem;
      background: var(--gray-50);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      font-size: 0.82rem; color: var(--text-secondary);
    }
    .chat-listing__title { font-weight: 500; color: var(--text-primary); }

    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1.25rem; display: flex;
      flex-direction: column; gap: 10px;
    }

    .msg { display: flex; flex-direction: column; max-width: 70%; }
    .msg--me   { align-self: flex-end; align-items: flex-end; }
    .msg--them { align-self: flex-start; align-items: flex-start; }

    .msg__bubble {
      padding: 9px 14px; border-radius: 16px;
      font-size: 0.875rem; line-height: 1.5;
    }
    .msg--me   .msg__bubble {
      background: var(--green-400); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg--them .msg__bubble {
      background: var(--gray-100); color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }
    .msg__time {
      font-size: 0.7rem; color: var(--text-muted);
      margin-top: 3px; padding: 0 4px;
    }

    .chat-input-row {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .chat-input {
      flex: 1; padding: 10px 16px;
      border: 1px solid var(--border-md);
      border-radius: 24px; font-size: 0.875rem;
      font-family: var(--font); outline: none;
      background: #fff; color: var(--text-primary);
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: var(--green-400); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--green-400); border: none;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .send-btn:hover { background: var(--green-600); }

    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.875rem;
      gap: 8px;
    }
    .empty-chat__icon { font-size: 2.5rem; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar__inner">
    <a href="dashboard.html" class="navbar__logo">
      <div class="navbar__logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="7" r="3" stroke="white" stroke-width="1.5"/>
          <path d="M9 11C5.7 11 3.5 12.8 3.5 15h11C14.5 12.8 12.3 11 9 11z" fill="white" opacity=".85"/>
        </svg>
      </div>
      Lost &amp; Found
    </a>
    <div class="navbar__links">
      <a href="dashboard.html" class="btn btn--ghost btn--sm">← Back</a>
    </div>
  </div>
</nav>

<div class="chat-layout">
  <div class="chat-window">

    <!-- Header -->
    <div class="chat-header">
      <div class="avatar avatar--md" id="chat-avatar">—</div>
      <div class="chat-header__info">
        <div class="chat-header__name" id="chat-name">Loading...</div>
        <div class="chat-header__sub">Community member</div>
      </div>
      <div class="chat-header__lock">🔒 Secure chat</div>
    </div>

    <!-- Listing reference -->
    <div class="chat-listing" id="chat-listing">
      <span>📋</span>
      <span>Loading listing...</span>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="empty-chat">
        <div class="empty-chat__icon">💬</div>
        <p>No messages yet. Say hello!</p>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-row">
      <input
        type="text"
        class="chat-input"
        id="chat-input"
        placeholder="Type a message..."
      />
      <button class="send-btn" id="send-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8l12-6-6 12V9L2 8z" fill="white"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  redirectIfNotAuthed();

  const params    = new URLSearchParams(window.location.search);
  const listingId = params.get('listing');
  const receiverId = params.get('user');

  let currentUser = null;
  let messages    = [];

  // ── Init ──
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session.user;

    await loadListing();
    await loadReceiver();
    await loadMessages();
    subscribeToMessages();
  }

  // ── Load listing info ──
  async function loadListing() {
    const { data } = await sb
      .from('listings')
      .select('title, type')
      .eq('id', listingId)
      .single();

    if (data) {
      document.getElementById('chat-listing').innerHTML = `
        <span class="badge badge--${data.type}">${data.type === 'lost' ? 'Lost' : 'Found'}</span>
        <span class="chat-listing__title">${data.title}</span>
      `;
    }
  }

  // ── Load receiver profile ──
  async function loadReceiver() {
    const { data } = await sb
      .from('profiles')
      .select('full_name, verified')
      .eq('id', receiverId)
      .single();

    if (data) {
      document.getElementById('chat-avatar').textContent = initials(data.full_name || 'U');
      document.getElementById('chat-name').textContent   = data.full_name || 'Unknown';
    }
  }

  // ── Load messages ──
  async function loadMessages() {
    const { data } = await sb
      .from('messages')
      .select('*')
      .eq('listing_id', listingId)
      .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
      .order('created_at', { ascending: true });

    messages = data || [];
    renderMessages();
  }

  // ── Render messages ──
  function renderMessages() {
    const box = document.getElementById('chat-messages');

    if (messages.length === 0) {
      box.innerHTML = `
        <div class="empty-chat">
          <div class="empty-chat__icon">💬</div>
          <p>No messages yet. Say hello!</p>
        </div>`;
      return;
    }

    box.innerHTML = messages.map(msg => {
      const isMe = msg.sender_id === currentUser.id;
      return `
        <div class="msg ${isMe ? 'msg--me' : 'msg--them'}">
          <div class="msg__bubble">${msg.body}</div>
          <div class="msg__time">${timeAgo(msg.created_at)}</div>
        </div>`;
    }).join('');

    // Scroll to bottom
    box.scrollTop = box.scrollHeight;
  }

  // ── Send message ──
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const body  = input.value.trim();
    if (!body) return;

    input.value = '';

    const { error } = await sb.from('messages').insert({
      listing_id:  listingId,
      sender_id:   currentUser.id,
      receiver_id: receiverId,
      body
    });

    if (error) showToast('Failed to send message', 'error');
  }

  // ── Realtime subscription ──
  function subscribeToMessages() {
    sb.channel('messages')
      .on('postgres_changes', {
        event:  'INSERT',
        schema: 'public',
        table:  'messages',
        filter: `listing_id=eq.${listingId}`
      }, (payload) => {
        messages.push(payload.new);
        renderMessages();
      })
      .subscribe();
  }

  // ── Event listeners ──
  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  init();
</script>

</body>
</html>
