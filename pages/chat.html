<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — ReFind Digital Noticeboard</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .chat-layout {
      display: flex; flex: 1; overflow: hidden;
      max-width: 1080px; margin: 0 auto;
      width: 100%; padding: 1rem;
      gap: 1rem;
    }
    .chat-window {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .chat-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .chat-header__info { flex: 1; }
    .chat-header__name { font-weight: 500; font-size: 0.95rem; color: var(--text-primary); }
    .chat-header__sub  { font-size: 0.75rem; color: var(--text-muted); }
    .chat-header__lock {
      font-size: 0.72rem; color: var(--brand-400);
      background: var(--brand-50);
      padding: 3px 8px; border-radius: 10px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .chat-listing {
      padding: 0.75rem 1.25rem;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      font-size: 0.82rem; color: var(--text-secondary);
    }
    .chat-listing__title { font-weight: 500; color: var(--text-primary); }
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1.25rem; display: flex;
      flex-direction: column; gap: 10px;
      background: var(--bg-primary);
    }
    .msg { display: flex; flex-direction: column; max-width: 70%; }
    .msg--me   { align-self: flex-end; align-items: flex-end; }
    .msg--them { align-self: flex-start; align-items: flex-start; }
    .msg__bubble {
      padding: 9px 14px; border-radius: 16px;
      font-size: 0.875rem; line-height: 1.5;
    }
    .msg--me .msg__bubble {
      background: var(--brand-400); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg--them .msg__bubble {
      background: var(--bg-secondary); color: var(--text-primary);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .msg__time {
      font-size: 0.7rem; color: var(--text-muted);
      margin-top: 3px; padding: 0 4px;
    }
    .chat-input-row {
      padding: 0.875rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center;
      background: var(--bg-secondary);
    }
    .chat-input {
      flex: 1; padding: 10px 16px;
      border: 1.5px solid var(--border-md);
      border-radius: 24px; font-size: 0.875rem;
      font-family: var(--font); outline: none;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: border-color 0.15s;
      min-width: 0;
    }
    .chat-input::placeholder { color: var(--text-muted); }
    .chat-input:focus { border-color: var(--brand-400); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--brand-400); border: none;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
      box-shadow: 0 2px 8px rgba(75,0,130,0.3);
    }
    .send-btn:hover { background: var(--brand-600); }
    .send-btn svg { display: block; }
    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.875rem;
      gap: 8px;
    }
    .empty-chat__icon { font-size: 2.5rem; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar__inner">
    <a href="dashboard.html" class="navbar__logo">
      <div class="navbar__logo-pill">
        <div class="navbar__logo-icon">
          <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
            <circle cx="8" cy="7" r="4" fill="none" stroke="#4B0082" stroke-width="2"/>
            <line x1="11.5" y1="11" x2="15" y2="15" stroke="#4B0082" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 5 Q8 3 10 5" fill="none" stroke="#4B0082" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9.5 4 L11 5.5 L9 6.5" fill="none" stroke="#4B0082" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="navbar__logo-text"><span>Re</span>Find</span>
      </div>
      <span class="navbar__logo-sub hide-mobile">Digital Noticeboard</span>
    </a>
    <div class="navbar__links">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
      <a href="dashboard.html" class="btn btn--ghost btn--sm">← Back</a>
    </div>
  </div>
</nav>

<div class="chat-layout">
  <div class="chat-window">

    <!-- Header -->
    <div class="chat-header">
      <div class="avatar avatar--md" id="chat-avatar">—</div>
      <div class="chat-header__info">
        <div class="chat-header__name" id="chat-name">Loading...</div>
        <div class="chat-header__sub">Community member</div>
      </div>
      <div class="chat-header__lock">🔒 Secure chat</div>
    </div>

    <!-- Listing reference -->
    <div class="chat-listing" id="chat-listing">
      <span>📋</span>
      <span>Loading listing...</span>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="empty-chat">
        <div class="empty-chat__icon">💬</div>
        <p>No messages yet. Say hello!</p>
      </div>
    </div>

    <!-- Input row -->
    <div class="chat-input-row">
      <input
        type="text"
        class="chat-input"
        id="chat-input"
        placeholder="Type a message..."
        autocomplete="off"
      />
      <button class="send-btn" id="send-btn" title="Send message">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
    <line x1="22" y1="2" x2="11" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <polygon points="22 2 15 22 11 13 2 9 22 2" stroke="white" stroke-width="2" fill="white" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script>
  redirectIfNotAuthed();
  initTheme();

  const params     = new URLSearchParams(window.location.search);
  const listingId  = params.get('listing');
  const receiverId = params.get('user');

  let currentUser = null;
  let messages    = [];

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session.user;
    await loadListing();
    await loadReceiver();
    await loadMessages();
    subscribeToMessages();
    // Focus input
    document.getElementById('chat-input').focus();
  }

  async function loadListing() {
    const { data } = await sb
      .from('listings')
      .select('title, type')
      .eq('id', listingId)
      .single();
    if (data) {
      document.getElementById('chat-listing').innerHTML = `
        <span class="badge badge--${data.type}">${data.type === 'lost' ? 'Lost' : 'Found'}</span>
        <span class="chat-listing__title">${data.title}</span>
      `;
    }
  }

  async function loadReceiver() {
    const { data } = await sb
      .from('profiles')
      .select('full_name, verified')
      .eq('id', receiverId)
      .single();
    if (data) {
      document.getElementById('chat-avatar').textContent = initials(data.full_name || 'U');
      document.getElementById('chat-name').textContent   = data.full_name || 'Unknown';
    }
  }

  async function loadMessages() {
    const { data } = await sb
      .from('messages')
      .select('*')
      .eq('listing_id', listingId)
      .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
      .order('created_at', { ascending: true });
    messages = data || [];
    renderMessages();
  }

  function renderMessages() {
    const box = document.getElementById('chat-messages');
    if (messages.length === 0) {
      box.innerHTML = `
        <div class="empty-chat">
          <div class="empty-chat__icon">💬</div>
          <p>No messages yet. Say hello!</p>
        </div>`;
      return;
    }
    box.innerHTML = messages.map(msg => {
      const isMe = msg.sender_id === currentUser.id;
      return `
        <div class="msg ${isMe ? 'msg--me' : 'msg--them'}">
          <div class="msg__bubble">${msg.body}</div>
          <div class="msg__time">${timeAgo(msg.created_at)}</div>
        </div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const body  = input.value.trim();
    if (!body) return;
    input.value = '';
    input.focus();
    const { error } = await sb.from('messages').insert({
      listing_id:  listingId,
      sender_id:   currentUser.id,
      receiver_id: receiverId,
      body
    });
    if (error) showToast('Failed to send message', 'error');
  }

  function subscribeToMessages() {
    sb.channel('messages')
      .on('postgres_changes', {
        event:  'INSERT',
        schema: 'public',
        table:  'messages',
        filter: `listing_id=eq.${listingId}`
      }, (payload) => {
        messages.push(payload.new);
        renderMessages();
      })
      .subscribe();
  }

  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  init();
</script>

</body>
</html>
